name: Deploy

on:
  push:
    branches: ["main"]

env:
  REGISTRY: deuslogistics.azurecr.io
  IMAGE_NAME: deus-logistics-api
  CONTAINER_APP_NAME: deus-logistics-api
  RESOURCE_GROUP: deus-logistics-rg

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements/dev-requirements.txt

      - name: Install dependencies
        run: pip install -r requirements/dev-requirements.txt

      - name: Run Ruff linter
        run: ruff check .

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name deuslogistics

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
 
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
 
      - name: Set App Insights connection string as Container App secret
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets "appinsights-connection-string=${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}"
 
      - name: Deploy new image and configure environment variables
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              "ENVIRONMENT=production" \
              "LOG_LEVEL=INFO" \
              "DATABASE_URL=sqlite+aiosqlite:///:memory:" \
              "APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-connection-string"
 
      - name: Verify deployment
        run: |
          az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.latestRevisionName" \
            --output tsv